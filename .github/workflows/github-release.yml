name: NuGet Release

on:
  release:
    types: [published]

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ./unfoldedcircle.slnx --locked-mode

      - name: Build
        run: dotnet build ./unfoldedcircle.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Compute package version from release tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=${TAG#v}
          if [[ -z "$VERSION" ]]; then
            echo "Release tag name is empty" >&2
            exit 1
          fi
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Pack libraries
        run: |
          dotnet pack ./src/UnfoldedCircle.Models/UnfoldedCircle.Models.csproj --configuration Release --no-build --output ./artifacts -p:Version=$PACKAGE_VERSION
          dotnet pack ./src/UnfoldedCircle.Server/UnfoldedCircle.Server.csproj --configuration Release --no-build --output ./artifacts -p:Version=$PACKAGE_VERSION

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_PAT }}
        shell: bash
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "NUGET_PAT secret is not set" >&2
            exit 1
          fi
          dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Publish
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
